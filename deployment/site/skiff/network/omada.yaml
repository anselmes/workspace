---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: omada
  namespace: ucp
spec:
  hostnames:
    - omada.kube.sandbox.local
  rules:
    - backendRefs:
        - name: omada-controller
          port: 8043
  parentRefs:
    - name: tls
      namespace: kube-system
