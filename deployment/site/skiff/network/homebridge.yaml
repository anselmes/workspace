---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homebridge
  namespace: ucp
spec:
  hostnames:
    - homebridge.kube.sandbox.local
  rules:
    - backendRefs:
        - name: homebridge
          port: 8581
  parentRefs:
    - name: default
      namespace: kube-system
